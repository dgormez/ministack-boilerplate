# ── Prerequisites (one-time GCP setup) ────────────────────────────────────────
# Run these commands once in Cloud Shell or with gcloud locally.
# Replace PROJECT_ID, PROJECT_NUMBER, and GITHUB_ORG/REPO_NAME with your values.
#
# 1. Enable required APIs:
#    gcloud services enable run.googleapis.com artifactregistry.googleapis.com iamcredentials.googleapis.com
#
# 2. Create a service account for GitHub Actions:
#    gcloud iam service-accounts create github-actions \
#      --display-name="GitHub Actions"
#
# 3. Grant it the roles it needs:
#    gcloud projects add-iam-policy-binding PROJECT_ID \
#      --member="serviceAccount:github-actions@PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/run.admin"
#    gcloud projects add-iam-policy-binding PROJECT_ID \
#      --member="serviceAccount:github-actions@PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/artifactregistry.writer"
#    gcloud projects add-iam-policy-binding PROJECT_ID \
#      --member="serviceAccount:github-actions@PROJECT_ID.iam.gserviceaccount.com" \
#      --role="roles/iam.serviceAccountTokenCreator"
#
# 4. Set up Workload Identity Federation (no JSON key needed):
#    gcloud iam workload-identity-pools create "github" --location="global" \
#      --display-name="GitHub Actions Pool"
#    gcloud iam workload-identity-pools providers create-oidc "github-actions" \
#      --location="global" \
#      --workload-identity-pool="github" \
#      --issuer-uri="https://token.actions.githubusercontent.com" \
#      --attribute-mapping="google.subject=assertion.sub,attribute.repository=assertion.repository"
#    gcloud iam service-accounts add-iam-policy-binding \
#      github-actions@PROJECT_ID.iam.gserviceaccount.com \
#      --role="roles/iam.workloadIdentityUser" \
#      --member="principalSet://iam.googleapis.com/projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github/attribute.repository/GITHUB_ORG/REPO_NAME"
#
# 5. Create the Artifact Registry repository (or use Terraform — see infra/gcp/):
#    gcloud artifacts repositories create ministack \
#      --repository-format=docker \
#      --location=REGION
#
# ── GitHub secrets to add (Settings → Secrets → Actions) ──────────────────────
# GCP_PROJECT_ID               → your GCP project id (e.g. my-project-123)
# GCP_REGION                   → deployment region   (e.g. us-central1)
# GCP_WORKLOAD_IDENTITY_PROVIDER → projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/github/providers/github-actions
# GCP_SERVICE_ACCOUNT          → github-actions@PROJECT_ID.iam.gserviceaccount.com
# DB_CONNECTION_STRING         → full Supabase connection string
# JWT_SECRET                   → your JWT secret (min 32 chars)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy backend to GCP Cloud Run

on:
  push:
    branches: [master]
    paths: [backend/**]
  workflow_dispatch:

env:
  SERVICE_NAME: ministack-api
  IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ministack/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            ./backend/MiniStack.Api
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region:  ${{ secrets.GCP_REGION }}
          image:   ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |
            ConnectionStrings__DefaultConnection=${{ secrets.DB_CONNECTION_STRING }}
            Jwt__Secret=${{ secrets.JWT_SECRET }}
            Jwt__Issuer=MiniStack
            Jwt__Audience=MiniStackApp
            Jwt__AccessTokenExpiryMinutes=15
            Jwt__RefreshTokenExpiryDays=30
            Google__AllowedClientIds__0=719484033277-dc4fv8f1a9p1n7hc0sqobmvatauqh65c.apps.googleusercontent.com
            Google__AllowedClientIds__1=719484033277-doi307nphggq2272ruucvas6gauc0b8r.apps.googleusercontent.com
            Google__AllowedClientIds__2=719484033277-ued1jvtuj5kibbgasuqljj297e793pg4.apps.googleusercontent.com
            Google__AllowedClientIds__3=719484033277-5uhbocdvfi2r6dh4nun2cnn5gvloirjc.apps.googleusercontent.com

      - name: Print service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
